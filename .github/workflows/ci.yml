name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: sqlite://./data/taskbane.db

jobs:
  prepare:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite

      - name: Create database and run migrations
        run: |
          mkdir -p data
          touch data/taskbane.db
          cargo sqlx migrate run

      - name: Generate sqlx query cache
        run: cargo sqlx prepare

      - name: Save sqlx cache
        uses: actions/cache/save@v4
        with:
          path: .sqlx/
          key: sqlx-${{ github.run_id }}

      - name: Build
        run: cargo build

  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Create database and run migrations
        run: |
          mkdir -p data
          touch data/taskbane.db
          cargo sqlx migrate run

      - name: Run tests
        run: cargo test

  clippy:
    name: Clippy
    needs: prepare
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Restore sqlx cache
        uses: actions/cache/restore@v4
        with:
          path: .sqlx/
          key: sqlx-${{ github.run_id }}

      - name: Run Clippy
        run: cargo clippy -- -A dead_code
