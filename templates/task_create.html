{# vim: set ft=jinja: #}
{% extends "_layout.html" %}

{% block title %}Create Task{% endblock %}

{% block content %}
  <div id="back-button">
    <a href="/task">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-square-arrow-left-icon lucide-square-arrow-left"
      >
        <rect width="18" height="18" x="3" y="3" rx="2" />
        <path d="m12 8-4 4 4 4" />
        <path d="M16 12H8" />
      </svg>
      All tasks
    </a>
  </div>

  <section>
    <article>
      <header>
        <h2>Create Task</h2>
      </header>

      <form hx-post="/task" hx-target="body">
        <label for="description">description</label>
        <input
          type="text"
          id="description"
          name="description"
          required
          autofocus
        />

        <label for="tags">+tag</label>
        <input type="text" id="tags" name="tags" placeholder="home fi" />

        <div id="deps-widget">
          <div id="deps-pills-container">
            <label for="deps-search">deps:</label>
            <div id="deps-pills"></div>
          </div>
          <template id="dep-pill-template">
            <span class="dep-pill">
              <span data-tooltip="" tabindex="0">
              </span>
              <button type="button" aria-label="Remove">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </span>
          </template>
          <input
            type="text"
            id="deps-search"
            autocomplete="off"
            placeholder="search tasks..."
          />
          <ul id="deps-results" role="listbox"></ul>
        </div>

        <label for="due">due:</label>
        <input
          id="due"
          name="due"
          type="text"
          hx-get="/task/date/parse"
          hx-trigger="keyup[this.value.length > 2] changed delay:250ms"
          hx-target="#due-helper"
          hx-target-400="#due-helper"
          hx-swap="outerHTML"
          hx-on:htmx:after-request="this.setAttribute('aria-invalid', event.detail.xhr.status != 400 ? 'false' : 'true')"
          aria-describedby="due-helper"
        />
        <small id="due-helper"></small>

        <label for="priority">Priority</label>
        <select id="priority" name="priority">
          <option value="l">Low</option>
          <option value="m" selected>Medium</option>
          <option value="h">High</option>
        </select>

        <footer>
          <button type="submit" class="primary">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-circle-plus-icon lucide-circle-plus"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M8 12h8" />
              <path d="M12 8v8" />
            </svg>
            Create
          </button>
        </footer>
      </form>
    </article>
  </section>
{% endblock %}

{% block scripts %}
<script>window.__TASKS__ = {{ tasks_json|safe }};</script>
<script src="/public/js/deps-select.js" defer></script>
{% endblock %}
